<div class="container">
    <div class="collection">
        <div class="filtre">

        </div>
        <div class="liste">
            <div class="case" *ngFor="let plante of plantes; let i = index" >
                <div class="vendu" *ngIf="!plante.dispo">EN RUPTURE</div>
                <img [src]="'assets/icons/coeur-'+ plante.coeur +'.svg'" alt="coeur" (click)="toogleFav(plante.image, plante.coeur, i)">
                <img [src]="'assets/PHOTOS SUCCULENTES/' + plante.image" alt="plante" (click)="navig(plante)">
                <div class="genre">{{ plante.genre | uppercase }} <div>
                <div class="espece">{{ plante.espece }}</div>
                <div class="prix">€ {{ plante.prix | virgule }}</div>
            </div>
        </div>
    </div>
</div>
