<div class="container">
    <div class="account" *ngIf="user$ | async as user">
        <div *ngIf="!!user; else noLoggin">
            {{user.displayName}}, {{user.email}}
            <button (click)="addAddress(user)">ajouter une adresse</button>
            <button (click)="signOut()">me déconnecter</button>
        </div>
        <ng-template #noLoggin>
            <button (click)="signInWithGoogle()">me connecter</button>
        </ng-template>
    </div>
</div>
